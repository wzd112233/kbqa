{% extends "ask/base.html" %}

{% block title %}我要提问 - 医疗知识问答系统{% endblock %}

{% block content %}
<div class="page-header">
    <h3 class="page-title">我要提问</h3>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">问题标题</label>
                    <input type="text" class="form-control" id="question-title" placeholder="请输入标题">
                </div>
                <div class="form-group">
                    <label class="form-label">问题详细</label>
                    <textarea class="form-control" id="question-details" rows="6" placeholder="请输入问题的详细描述"></textarea>
                </div>
                <div class="d-grid d-md-block">
                    <button type="button" class="btn btn-primary" id="publish-question">提交问题</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="question-data" url="{{ url_for('ask.question_add') }}"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/ask.js') }}"></script>
{% endblock %}
