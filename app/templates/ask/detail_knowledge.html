{% extends "ask/base.html" %}

{% block title %}知识库详情 - 医疗知识问答系统{% endblock %}

{% block content %}
<div class="page-header">
    <h3 class="page-title">知识库详情</h3>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="card mb-3">
            <div class="card-body">
                <h4 class="card-title mb-3">{{ kl.title }}</h4>
                <div class="mb-4" style="white-space: pre-wrap;">{{ kl.content }}</div>

                <div class="border-top pt-3">
                    <h5 class="mb-2">答案</h5>
                    <div style="white-space: pre-wrap;">{{ kl.answers }}</div>
                </div>
            </div>
        </div>
        <a class="btn btn-light" href="{{ url_for('ask.knowledge_list', page=1) }}">返回列表</a>
    </div>
</div>
{% endblock %}
